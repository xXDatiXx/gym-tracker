<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Iconos SVG simplificados
    const Download = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
    );

    const Plus = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    );

    const Trash2 = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    );

    const TrendingUp = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
      </svg>
    );

    const BarChart3 = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="9"/><rect x="14" y="5" width="3" height="14"/>
      </svg>
    );

    const Moon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    );

    const Sun = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    );

    const ChevronDown = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    );

    const ChevronUp = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    );

    const Settings = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m8.66-15.66l-4.24 4.24m-4.24 4.24l-4.24 4.24M23 12h-6m-6 0H1m20.66 8.66l-4.24-4.24m-4.24-4.24l-4.24-4.24"/>
      </svg>
    );

    const X = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );

    const GymTracker = () => {
      const diasDefault = {
        lunes: {
          nombre: 'Lunes - Push Pecho',
          ejercicios: [
            'Press de Banca Plano (Barra)',
            'Press Militar de Pie (Barra)',
            'Fondos en Paralelas (Lastrados)',
            'Press Inclinado Mancuernas (Neutro)',
            'Elevaciones Laterales en Polea',
            'Press Francés (Barra Z)'
          ]
        },
        martes: {
          nombre: 'Martes - Pull Espalda',
          ejercicios: [
            'Dominadas Pronas (Lastradas)',
            'Remo Pendlay (Barra)',
            'Jalón al Pecho Agarre Supino',
            'Remo en Polea Baja (Cuerda)',
            'Face Pulls',
            'Curl Martillo en Polea'
          ]
        },
        miercoles: {
          nombre: 'Miércoles - Pierna + Abs',
          ejercicios: [
            'Sentadilla Trasera (Barra)',
            'Peso Muerto Rumano (Mancuernas)',
            'Prensa de Piernas (Pies bajos)',
            'Leg Curl (Femoral) Acostado',
            'Elevación de Talones de pie',
            'Crunch en Polea Alta (Lastrado)'
          ]
        },
        jueves: {
          nombre: 'Jueves - Push Hombro',
          ejercicios: [
            'Press Inclinado (Barra)',
            'Press Arnold (Mancuernas)',
            'Press de Banca con Mancuernas',
            'Peck Deck (Aperturas Máquina)',
            'Extensiones Tríceps sobre cabeza',
            'Flexiones Diamante (Lastradas)'
          ]
        },
        viernes: {
          nombre: 'Viernes - Pull Bíceps',
          ejercicios: [
            'Chin-ups / Supinas (Lastradas)',
            'Remo T',
            'Pull-over en Polea Alta',
            'Remo con Mancuerna a una mano',
            'Curl en Banco Inclinado (Manc.)',
            'Plancha Abdominal (Lastrada)'
          ]
        }
      };

      const [dias, setDias] = useState(diasDefault);
      const [diaActivo, setDiaActivo] = useState('lunes');
      const [vistaActiva, setVistaActiva] = useState('registro');
      const [registros, setRegistros] = useState({});
      const [temaOscuro, setTemaOscuro] = useState(false);
      const [archivoExpandido, setArchivoExpandido] = useState({});
      const [sesionesExpandidas, setSesionesExpandidas] = useState({});
      const [diasSeleccionados, setDiasSeleccionados] = useState({
        lunes: true,
        martes: false,
        miercoles: false,
        jueves: false,
        viernes: false
      });
      const [ultimaSesionAgregada, setUltimaSesionAgregada] = useState(null);
      const [editandoDia, setEditandoDia] = useState(null);
      const [nuevoEjercicio, setNuevoEjercicio] = useState('');

      useEffect(() => {
        const stored = localStorage.getItem('gymTrackerData');
        const storedTema = localStorage.getItem('gymTrackerTema');
        const storedDias = localStorage.getItem('gymTrackerDias');
        
        if (stored) setRegistros(JSON.parse(stored));
        if (storedTema) setTemaOscuro(storedTema === 'oscuro');
        if (storedDias) setDias(JSON.parse(storedDias));
      }, []);

      useEffect(() => {
        localStorage.setItem('gymTrackerData', JSON.stringify(registros));
      }, [registros]);

      useEffect(() => {
        localStorage.setItem('gymTrackerTema', temaOscuro ? 'oscuro' : 'claro');
      }, [temaOscuro]);

      useEffect(() => {
        localStorage.setItem('gymTrackerDias', JSON.stringify(dias));
      }, [dias]);

      const coloresDias = {
        lunes: '#3B82F6',
        martes: '#EF4444',
        miercoles: '#10B981',
        jueves: '#F59E0B',
        viernes: '#8B5CF6'
      };

      const agregarSesionCompleta = (dia) => {
        const hoy = new Date();
        const fecha = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
        const nuevosRegistros = { ...registros };
        
        if (!nuevosRegistros[dia]) nuevosRegistros[dia] = [];
        
        const sessionId = `${fecha}-${Date.now()}`;
        
        dias[dia].ejercicios.forEach(ejercicio => {
          nuevosRegistros[dia].push({
            id: Date.now() + Math.random(),
            sessionId,
            fecha,
            ejercicio,
            series: 3,
            reps: 8,
            peso: 0,
            rir: ''
          });
        });
        
        setRegistros(nuevosRegistros);
        setUltimaSesionAgregada(sessionId);
        setSesionesExpandidas({...sesionesExpandidas, [sessionId]: true});
        
        setTimeout(() => setUltimaSesionAgregada(null), 3000);
      };

      const actualizarFechaSesion = (dia, sessionId, nuevaFecha) => {
        const nuevosRegistros = { ...registros };
        nuevosRegistros[dia] = nuevosRegistros[dia].map(reg => 
          reg.sessionId === sessionId ? { ...reg, fecha: nuevaFecha } : reg
        );
        setRegistros(nuevosRegistros);
      };

      const actualizarRegistro = (dia, id, campo, valor) => {
        const nuevosRegistros = { ...registros };
        const index = nuevosRegistros[dia].findIndex(r => r.id === id);
        if (index !== -1) {
          nuevosRegistros[dia][index][campo] = valor;
          setRegistros(nuevosRegistros);
        }
      };

      const eliminarRegistro = (dia, id) => {
        const nuevosRegistros = { ...registros };
        nuevosRegistros[dia] = nuevosRegistros[dia].filter(r => r.id !== id);
        setRegistros(nuevosRegistros);
      };

      const calcularVolumen = (registro) => {
        return registro.series * registro.reps * registro.peso;
      };

      const calcularVolumenSesion = (ejercicios) => {
        return ejercicios.reduce((total, reg) => total + calcularVolumen(reg), 0);
      };

      const obtenerProgresionPorDias = () => {
        const datos = {};
        
        Object.keys(diasSeleccionados).forEach(dia => {
          if (!diasSeleccionados[dia] || !registros[dia]) return;
          
          dias[dia].ejercicios.forEach(ejercicio => {
            if (!datos[ejercicio]) datos[ejercicio] = [];
            
            registros[dia]
              .filter(r => r.ejercicio === ejercicio)
              .forEach(r => {
                datos[ejercicio].push({
                  fecha: r.fecha,
                  peso: r.peso,
                  dia: dia
                });
              });
          });
        });
        
        Object.keys(datos).forEach(ejercicio => {
          datos[ejercicio].sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
        });
        
        return datos;
      };

      const obtenerVolumenPorDias = () => {
        const datos = {};
        
        Object.keys(diasSeleccionados).forEach(dia => {
          if (!diasSeleccionados[dia] || !registros[dia]) return;
          
          const sesiones = agruparPorSesion(registros[dia]);
          sesiones.forEach(sesion => {
            if (!datos[dia]) datos[dia] = [];
            datos[dia].push({
              fecha: sesion.fecha,
              volumen: calcularVolumenSesion(sesion.ejercicios)
            });
          });
        });
        
        Object.keys(datos).forEach(dia => {
          datos[dia].sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
        });
        
        return datos;
      };

      const agruparPorSesion = (registrosDia) => {
        if (!registrosDia) return [];
        const sesiones = {};
        registrosDia.forEach(reg => {
          const key = reg.sessionId || reg.fecha;
          if (!sesiones[key]) {
            sesiones[key] = {
              fecha: reg.fecha,
              sessionId: key,
              ejercicios: []
            };
          }
          sesiones[key].ejercicios.push(reg);
        });
        return Object.values(sesiones).sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
      };

      const toggleSesion = (sessionId) => {
        setSesionesExpandidas({
          ...sesionesExpandidas,
          [sessionId]: !sesionesExpandidas[sessionId]
        });
      };

      const agregarEjercicio = (dia) => {
        if (!nuevoEjercicio.trim()) return;
        const nuevosDias = { ...dias };
        nuevosDias[dia].ejercicios.push(nuevoEjercicio.trim());
        setDias(nuevosDias);
        setNuevoEjercicio('');
      };

      const eliminarEjercicio = (dia, index) => {
        const nuevosDias = { ...dias };
        nuevosDias[dia].ejercicios.splice(index, 1);
        setDias(nuevosDias);
      };

      const moverEjercicio = (dia, index, direccion) => {
        const nuevosDias = { ...dias };
        const ejercicios = [...nuevosDias[dia].ejercicios];
        const newIndex = index + direccion;
        
        if (newIndex >= 0 && newIndex < ejercicios.length) {
          [ejercicios[index], ejercicios[newIndex]] = [ejercicios[newIndex], ejercicios[index]];
          nuevosDias[dia].ejercicios = ejercicios;
          setDias(nuevosDias);
        }
      };

      const exportarCSV = () => {
        let csv = 'Día,Fecha,Ejercicio,Series,Reps,Peso,RIR,Volumen\n';
        
        Object.keys(registros).forEach(dia => {
          if (registros[dia]) {
            registros[dia].forEach(reg => {
              csv += `${dias[dia].nombre},${reg.fecha},${reg.ejercicio},${reg.series},${reg.reps},${reg.peso},${reg.rir || ''},${calcularVolumen(reg)}\n`;
            });
          }
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'registro_entrenamiento.csv';
        a.click();
      };

      const bgPrimary = temaOscuro ? 'bg-gray-900' : 'bg-gray-50';
      const bgSecundary = temaOscuro ? 'bg-gray-800' : 'bg-white';
      const textPrimary = temaOscuro ? 'text-gray-100' : 'text-gray-800';
      const textSecundary = temaOscuro ? 'text-gray-300' : 'text-gray-600';
      const border = temaOscuro ? 'border-gray-700' : 'border-gray-200';
      const hover = temaOscuro ? 'hover:bg-gray-700' : 'hover:bg-gray-50';
      const inputBg = temaOscuro ? 'bg-gray-700 text-gray-100' : 'bg-white text-gray-900';

      return (
        <div className={`min-h-screen ${bgPrimary} p-4`}>
          <div className="max-w-7xl mx-auto">
            <div className={`${bgSecundary} rounded-lg shadow-lg p-6 mb-6`}>
              <div className="flex justify-between items-center mb-6 flex-wrap gap-4">
                <h1 className={`text-3xl font-bold ${textPrimary}`}>Registro de Entrenamiento</h1>
                <div className="flex gap-2">
                  <button
                    onClick={() => setVistaActiva('ajustes')}
                    className={`p-2 rounded-lg ${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80 transition`}
                  >
                    <Settings size={20} />
                  </button>
                  <button
                    onClick={() => setTemaOscuro(!temaOscuro)}
                    className={`p-2 rounded-lg ${temaOscuro ? 'bg-gray-700 text-yellow-400' : 'bg-gray-200 text-gray-700'} hover:opacity-80 transition`}
                  >
                    {temaOscuro ? <Sun size={20} /> : <Moon size={20} />}
                  </button>
                  <button
                    onClick={exportarCSV}
                    className="flex items-center gap-2 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition"
                  >
                    <Download size={20} />
                    CSV
                  </button>
                </div>
              </div>

              <div className="flex gap-2 mb-6 overflow-x-auto">
                <button
                  onClick={() => setVistaActiva('registro')}
                  className={`px-4 py-2 rounded-lg transition whitespace-nowrap ${
                    vistaActiva === 'registro'
                      ? 'bg-blue-600 text-white'
                      : `${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80`
                  }`}
                >
                  Registro
                </button>
                <button
                  onClick={() => setVistaActiva('progresion')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg transition whitespace-nowrap ${
                    vistaActiva === 'progresion'
                      ? 'bg-blue-600 text-white'
                      : `${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80`
                  }`}
                >
                  <TrendingUp size={18} />
                  Progresión
                </button>
                <button
                  onClick={() => setVistaActiva('volumen')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg transition whitespace-nowrap ${
                    vistaActiva === 'volumen'
                      ? 'bg-blue-600 text-white'
                      : `${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80`
                  }`}
                >
                  <BarChart3 size={18} />
                  Volumen
                </button>
              </div>

              {vistaActiva === 'registro' && (
                <>
                  <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                    {Object.keys(dias).map(dia => (
                      <button
                        key={dia}
                        onClick={() => setDiaActivo(dia)}
                        className={`px-4 py-2 rounded-lg whitespace-nowrap transition ${
                          diaActivo === dia
                            ? 'bg-blue-600 text-white'
                            : `${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80`
                        }`}
                      >
                        {dias[dia].nombre}
                      </button>
                    ))}
                  </div>

                  <div className="mb-4">
                    <button
                      onClick={() => agregarSesionCompleta(diaActivo)}
                      className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition"
                    >
                      <Plus size={20} />
                      Agregar Sesión del Día
                    </button>
                  </div>

                  {(() => {
                    const sesiones = agruparPorSesion(registros[diaActivo]);
                    const sesionesRecientes = sesiones.slice(0, 4);
                    const sesionesArchivadas = sesiones.slice(4);

                    return (
                      <>
                        <div className="space-y-4">
                          {sesionesRecientes.map((sesion) => {
                            const isExpanded = sesionesExpandidas[sesion.sessionId] !== false;
                            const isNueva = ultimaSesionAgregada === sesion.sessionId;
                            
                            return (
                              <div key={sesion.sessionId} className={`border ${border} rounded-lg overflow-hidden ${isNueva ? 'ring-2 ring-green-500' : ''}`}>
                                <div
                                  className={`flex items-center justify-between p-4 cursor-pointer ${hover}`}
                                  onClick={(e) => {
                                    if (e.target.type !== 'date') {
                                      toggleSesion(sesion.sessionId);
                                    }
                                  }}
                                >
                                  <div className="flex items-center gap-3">
                                    {isExpanded ? <ChevronUp size={20} className={textPrimary} /> : <ChevronDown size={20} className={textPrimary} />}
                                    <div>
                                      <div className="flex items-center gap-2">
                                        <input
                                          type="date"
                                          value={sesion.fecha}
                                          onChange={(e) => {
                                            e.stopPropagation();
                                            actualizarFechaSesion(diaActivo, sesion.sessionId, e.target.value);
                                          }}
                                          onClick={(e) => e.stopPropagation()}
                                          className={`font-semibold ${inputBg} border ${border} rounded px-2 py-1`}
                                        />
                                        {isNueva && (
                                          <span className="bg-green-500 text-white text-xs px-2 py-1 rounded-full">
                                            NUEVA
                                          </span>
                                        )}
                                      </div>
                                      <span className={`text-sm ${textSecundary}`}>
                                        Volumen total: {calcularVolumenSesion(sesion.ejercicios).toFixed(1)} kg
                                      </span>
                                    </div>
                                  </div>
                                  <span className={`text-sm ${textSecundary}`}>
                                    {sesion.ejercicios.length} ejercicios
                                  </span>
                                </div>
                                
                                {isExpanded && (
                                  <div className="overflow-x-auto">
                                    <table className="w-full">
                                      <thead>
                                        <tr className={temaOscuro ? 'bg-gray-700' : 'bg-gray-100'}>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}>Ejercicio</th>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}>Series</th>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}>Reps</th>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}>Peso</th>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}>RIR</th>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}>Vol</th>
                                          <th className={`px-4 py-3 text-left text-sm font-semibold ${textPrimary}`}></th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {sesion.ejercicios.map((registro) => (
                                          <tr key={registro.id} className={`border-b ${border}`}>
                                            <td className={`px-4 py-3 ${textSecundary} text-sm`}>
                                              {registro.ejercicio}
                                            </td>
                                            <td className="px-4 py-3">
                                              <input
                                                type="number"
                                                value={registro.series}
                                                onChange={(e) => actualizarRegistro(diaActivo, registro.id, 'series', parseInt(e.target.value) || 0)}
                                                className={`border ${border} rounded px-2 py-1 w-16 ${inputBg}`}
                                                min="0"
                                              />
                                            </td>
                                            <td className="px-4 py-3">
                                              <input
                                                type="number"
                                                value={registro.reps}
                                                onChange={(e) => actualizarRegistro(diaActivo, registro.id, 'reps', parseInt(e.target.value) || 0)}
                                                className={`border ${border} rounded px-2 py-1 w-16 ${inputBg}`}
                                                min="0"
                                              />
                                            </td>
                                            <td className="px-4 py-3">
                                              <input
                                                type="number"
                                                value={registro.peso}
                                                onChange={(e) => actualizarRegistro(diaActivo, registro.id, 'peso', parseFloat(e.target.value) || 0)}
                                                className={`border ${border} rounded px-2 py-1 w-20 ${inputBg}`}
                                                min="0"
                                                step="0.5"
                                              />
                                            </td>
                                            <td className="px-4 py-3">
                                              <input
                                                type="text"
                                                value={registro.rir}
                                                onChange={(e) => actualizarRegistro(diaActivo, registro.id, 'rir', e.target.value)}
                                                className={`border ${border} rounded px-2 py-1 w-12 ${inputBg}`}
                                                placeholder="0-3"
                                              />
                                            </td>
                                            <td className={`px-4 py-3 font-semibold ${textPrimary} text-sm`}>
                                              {calcularVolumen(registro).toFixed(0)}
                                            </td>
                                            <td className="px-4 py-3">
                                              <button
                                                onClick={() => eliminarRegistro(diaActivo, registro.id)}
                                                className="text-red-600 hover:text-red-800 transition"
                                              >
                                                <Trash2 size={16} />
                                              </button>
                                            </td>
                                          </tr>
                                        ))}
                                      </tbody>
                                    </table>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                          
                          {sesionesRecientes.length === 0 && (
                            <div className={`text-center py-8 ${textSecundary}`}>
                              No hay registros. Agrega tu primera sesión.
                            </div>
                          )}
                        </div>

                        {sesionesArchivadas.length > 0 && (
                          <div className="mt-6">
                            <button
                              onClick={() => setArchivoExpandido({...archivoExpandido, [diaActivo]: !archivoExpandido[diaActivo]})}
                              className={`flex items-center gap-2 ${textPrimary} hover:opacity-80 transition font-semibold`}
                            >
                              {archivoExpandido[diaActivo] ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                              Historial ({sesionesArchivadas.length} sesiones antiguas)
                            </button>
                            
                            {archivoExpandido[diaActivo] && (
                              <div className="space-y-4 mt-4">
                                {sesionesArchivadas.map((sesion) => (
                                  <div key={sesion.sessionId} className={`border ${border} rounded-lg p-4`}>
                                    <div className="flex items-center justify-between mb-2">
                                      <span className={`font-semibold ${textPrimary}`}>{sesion.fecha}</span>
                                      <span className={`text-sm ${textSecundary}`}>
                                        Vol: {calcularVolumenSesion(sesion.ejercicios).toFixed(1)} kg
                                      </span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 text-sm">
                                      {sesion.ejercicios.map((reg) => (
                                        <div key={reg.id} className={textSecundary}>
                                          {reg.ejercicio}: {reg.series}×{reg.reps} @ {reg.peso}kg
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </>
                    );
                  })()}
                </>
              )}

              {vistaActiva === 'progresion' && (
                <div>
                  <h2 className={`text-2xl font-bold mb-4 ${textPrimary}`}>Progresión por Ejercicio</h2>
                  
                  <div className="mb-6">
                    <label className={`block mb-3 font-semibold ${textPrimary}`}>Selecciona días para comparar:</label>
                    <div className="flex flex-wrap gap-3">
                      {Object.keys(dias).map(dia => (
                        <label key={dia} className="flex items-center gap-2 cursor-pointer">
                          <input
                            type="checkbox"
                            checked={diasSeleccionados[dia]}
                            onChange={(e) => setDiasSeleccionados({...diasSeleccionados, [dia]: e.target.checked})}
                            className="w-4 h-4"
                          />
                          <span className={textPrimary} style={{ color: coloresDias[dia] }}>
                            {dias[dia].nombre}
                          </span>
                        </label>
                      ))}
                    </div>
                  </div>

                  {(() => {
                    const progresion = obtenerProgresionPorDias();
                    const ejerciciosConDatos = Object.keys(progresion).filter(ej => progresion[ej].length > 0);
                    
                    if (ejerciciosConDatos.length === 0) {
                      return (
                        <div className={`text-center py-12 ${textSecundary}`}>
                          No hay datos para los días seleccionados.
                        </div>
                      );
                    }

                    const todasLasFechas = [...new Set(
                      ejerciciosConDatos.flatMap(ej => progresion[ej].map(d => d.fecha))
                    )].sort();

                    const maxPeso = Math.max(...ejerciciosConDatos.flatMap(ej => progresion[ej].map(d => d.peso)));

                    return (
                      <div className="space-y-8">
                        {ejerciciosConDatos.map(ejercicio => (
                          <div key={ejercicio} className={`border ${border} rounded-lg p-6`}>
                            <h3 className={`font-semibold text-lg mb-4 ${textPrimary}`}>{ejercicio}</h3>
                            
                            <div className="relative h-64 mb-8">
                              <svg className="w-full h-full" viewBox="0 0 100 120" preserveAspectRatio="none">
                                <defs>
                                  <style>
                                    {`.label-text { font-size: 3px; }`}
                                  </style>
                                </defs>
                                
                                {todasLasFechas.map((fecha, idx) => {
                                  const x = (idx / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                  return (
                                    <line
                                      key={fecha}
                                      x1={x}
                                      y1="0"
                                      x2={x}
                                      y2="100"
                                      stroke={temaOscuro ? '#374151' : '#E5E7EB'}
                                      strokeWidth="0.5"
                                      vectorEffect="non-scaling-stroke"
                                    />
                                  );
                                })}
                                
                                {progresion[ejercicio].map((dato, idx, arr) => {
                                  const x = (todasLasFechas.indexOf(dato.fecha) / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                  const y = 100 - ((dato.peso / maxPeso) * 85);
                                  
                                  return (
                                    <g key={idx}>
                                      {idx < arr.length - 1 && (() => {
                                        const nextDato = arr[idx + 1];
                                        const nextX = (todasLasFechas.indexOf(nextDato.fecha) / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                        const nextY = 100 - ((nextDato.peso / maxPeso) * 85);
                                        
                                        return (
                                          <line
                                            x1={x}
                                            y1={y}
                                            x2={nextX}
                                            y2={nextY}
                                            stroke={coloresDias[dato.dia]}
                                            strokeWidth="2"
                                            vectorEffect="non-scaling-stroke"
                                          />
                                        );
                                      })()}
                                      <circle
                                        cx={x}
                                        cy={y}
                                        r="1.5"
                                        fill={coloresDias[dato.dia]}
                                        vectorEffect="non-scaling-stroke"
                                      />
                                      <text
                                        x={x}
                                        y={y - 3}
                                        textAnchor="middle"
                                        className="label-text"
                                        fill={temaOscuro ? '#E5E7EB' : '#374151'}
                                        style={{ fontSize: '3px', fontWeight: 'bold' }}
                                      >
                                        {dato.peso}kg
                                      </text>
                                      <text
                                        x={x}
                                        y="110"
                                        textAnchor="middle"
                                        className="label-text"
                                        fill={temaOscuro ? '#9CA3AF' : '#6B7280'}
                                        style={{ fontSize: '2.5px' }}
                                      >
                                        {dato.fecha.substring(5)}
                                      </text>
                                    </g>
                                  );
                                })}
                              </svg>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
              )}

              {vistaActiva === 'volumen' && (
                <div>
                  <h2 className={`text-2xl font-bold mb-4 ${textPrimary}`}>Volumen por Sesión</h2>
                  
                  <div className="mb-6">
                    <label className={`block mb-3 font-semibold ${textPrimary}`}>Selecciona días para comparar:</label>
                    <div className="flex flex-wrap gap-3">
                      {Object.keys(dias).map(dia => (
                        <label key={dia} className="flex items-center gap-2 cursor-pointer">
                          <input
                            type="checkbox"
                            checked={diasSeleccionados[dia]}
                            onChange={(e) => setDiasSeleccionados({...diasSeleccionados, [dia]: e.target.checked})}
                            className="w-4 h-4"
                          />
                          <span className={textPrimary} style={{ color: coloresDias[dia] }}>
                            {dias[dia].nombre}
                          </span>
                        </label>
                      ))}
                    </div>
                  </div>

                  {(() => {
                    const volumenPorDias = obtenerVolumenPorDias();
                    const diasConDatos = Object.keys(volumenPorDias).filter(dia => volumenPorDias[dia].length > 0);
                    
                    if (diasConDatos.length === 0) {
                      return (
                        <div className={`text-center py-12 ${textSecundary}`}>
                          No hay datos para los días seleccionados.
                        </div>
                      );
                    }

                    const todasLasFechas = [...new Set(
                      diasConDatos.flatMap(dia => volumenPorDias[dia].map(d => d.fecha))
                    )].sort();

                    const maxVolumen = Math.max(...diasConDatos.flatMap(dia => volumenPorDias[dia].map(d => d.volumen)));

                    return (
                      <div className={`border ${border} rounded-lg p-6`}>
                        <h3 className={`font-semibold text-lg mb-4 ${textPrimary}`}>Comparación de Volumen</h3>
                        
                        <div className="relative h-80 mb-8">
                          <svg className="w-full h-full" viewBox="0 0 100 120" preserveAspectRatio="none">
                            <defs>
                              <style>
                                {`.label-text { font-size: 3px; }`}
                              </style>
                            </defs>
                            
                            {todasLasFechas.map((fecha, idx) => {
                              const x = (idx / Math.max(todasLasFechas.length - 1, 1)) * 100;
                              return (
                                <line
                                  key={fecha}
                                  x1={x}
                                  y1="0"
                                  x2={x}
                                  y2="100"
                                  stroke={temaOscuro ? '#374151' : '#E5E7EB'}
                                  strokeWidth="0.5"
                                  vectorEffect="non-scaling-stroke"
                                />
                              );
                            })}
                            
                            {diasConDatos.map(dia => {
                              return volumenPorDias[dia].map((dato, idx, arr) => {
                                const x = (todasLasFechas.indexOf(dato.fecha) / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                const y = 100 - ((dato.volumen / maxVolumen) * 85);
                                
                                return (
                                  <g key={`${dia}-${idx}`}>
                                    {idx < arr.length - 1 && (() => {
                                      const nextDato = arr[idx + 1];
                                      const nextX = (todasLasFechas.indexOf(nextDato.fecha) / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                      const nextY = 100 - ((nextDato.volumen / maxVolumen) * 85);
                                      
                                      return (
                                        <line
                                          x1={x}
                                          y1={y}
                                          x2={nextX}
                                          y2={nextY}
                                          stroke={coloresDias[dia]}
                                          strokeWidth="2"
                                          vectorEffect="non-scaling-stroke"
                                        />
                                      );
                                    })()}
                                    <circle
                                      cx={x}
                                      cy={y}
                                      r="1.5"
                                      fill={coloresDias[dia]}
                                      vectorEffect="non-scaling-stroke"
                                    />
                                    <text
                                      x={x}
                                      y={y - 3}
                                      textAnchor="middle"
                                      className="label-text"
                                      fill={temaOscuro ? '#E5E7EB' : '#374151'}
                                      style={{ fontSize: '3px', fontWeight: 'bold' }}
                                    >
                                      {Math.round(dato.volumen)}kg
                                    </text>
                                    <text
                                      x={x}
                                      y="110"
                                      textAnchor="middle"
                                      className="label-text"
                                      fill={temaOscuro ? '#9CA3AF' : '#6B7280'}
                                      style={{ fontSize: '2.5px' }}
                                    >
                                      {dato.fecha.substring(5)}
                                    </text>
                                  </g>
                                );
                              });
                            })}
                          </svg>
                        </div>
                        
                        <div className="mt-6">
                          <h4 className={`font-semibold mb-3 ${textPrimary}`}>Leyenda</h4>
                          <div className="flex flex-wrap gap-4">
                            {diasConDatos.map(dia => (
                              <div key={dia} className="flex items-center gap-2">
                                <div 
                                  className="w-4 h-4 rounded"
                                  style={{ backgroundColor: coloresDias[dia] }}
                                />
                                <span className={textSecundary}>{dias[dia].nombre}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}

              {vistaActiva === 'ajustes' && (
                <div>
                  <h2 className={`text-2xl font-bold mb-6 ${textPrimary}`}>Configuración de Ejercicios</h2>
                  
                  <div className="space-y-6">
                    {Object.keys(dias).map(dia => (
                      <div key={dia} className={`border ${border} rounded-lg p-6`}>
                        <h3 className={`font-semibold text-lg mb-4 ${textPrimary}`}>{dias[dia].nombre}</h3>
                        
                        <div className="space-y-2 mb-4">
                          {dias[dia].ejercicios.map((ejercicio, idx) => (
                            <div key={idx} className={`flex items-center gap-2 p-2 rounded ${hover}`}>
                              <span className={`flex-1 ${textPrimary}`}>{ejercicio}</span>
                              <button
                                onClick={() => moverEjercicio(dia, idx, -1)}
                                disabled={idx === 0}
                                className={`p-1 rounded ${idx === 0 ? 'opacity-30' : 'hover:bg-blue-100'}`}
                              >
                                <ChevronUp size={16} />
                              </button>
                              <button
                                onClick={() => moverEjercicio(dia, idx, 1)}
                                disabled={idx === dias[dia].ejercicios.length - 1}
                                className={`p-1 rounded ${idx === dias[dia].ejercicios.length - 1 ? 'opacity-30' : 'hover:bg-blue-100'}`}
                              >
                                <ChevronDown size={16} />
                              </button>
                              <button
                                onClick={() => eliminarEjercicio(dia, idx)}
                                className="p-1 text-red-600 hover:bg-red-100 rounded"
                              >
                                <X size={16} />
                              </button>
                            </div>
                          ))}
                        </div>
                        
                        <div className="flex gap-2">
                          <input
                            type="text"
                            value={editandoDia === dia ? nuevoEjercicio : ''}
                            onChange={(e) => {
                              setEditandoDia(dia);
                              setNuevoEjercicio(e.target.value);
                            }}
                            onKeyPress={(e) => {
                              if (e.key === 'Enter') {
                                agregarEjercicio(dia);
                                setEditandoDia(null);
                              }
                            }}
                            placeholder="Nuevo ejercicio..."
                            className={`flex-1 border ${border} rounded px-3 py-2 ${inputBg}`}
                          />
                          <button
                            onClick={() => {
                              agregarEjercicio(dia);
                              setEditandoDia(null);
                            }}
                            className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"
                          >
                            <Plus size={20} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<GymTracker />, document.getElementById('root'));
  </script>
</body>
</html>
