<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GymTracker = () => {
            const diasDefault = {
                lunes: {
                nombre: 'Lunes - Push Pecho',
                ejercicios: [
                    'Press de Banca Plano (Barra)',
                    'Press Militar de Pie (Barra)',
                    'Fondos en Paralelas (Lastrados)',
                    'Press Inclinado Mancuernas (Neutro)',
                    'Elevaciones Laterales en Polea',
                    'Press Francés (Barra Z)'
                ]
                },
                martes: {
                nombre: 'Martes - Pull Espalda',
                ejercicios: [
                    'Dominadas Pronas (Lastradas)',
                    'Remo Pendlay (Barra)',
                    'Jalón al Pecho Agarre Supino',
                    'Remo en Polea Baja (Cuerda)',
                    'Face Pulls',
                    'Curl Martillo en Polea'
                ]
                },
                miercoles: {
                nombre: 'Miércoles - Pierna + Abs',
                ejercicios: [
                    'Sentadilla Trasera (Barra)',
                    'Peso Muerto Rumano (Mancuernas)',
                    'Prensa de Piernas (Pies bajos)',
                    'Leg Curl (Femoral) Acostado',
                    'Elevación de Talones de pie',
                    'Crunch en Polea Alta (Lastrado)'
                ]
                },
                jueves: {
                nombre: 'Jueves - Push Hombro',
                ejercicios: [
                    'Press Inclinado (Barra)',
                    'Press Arnold (Mancuernas)',
                    'Press de Banca con Mancuernas',
                    'Peck Deck (Aperturas Máquina)',
                    'Extensiones Tríceps sobre cabeza',
                    'Flexiones Diamante (Lastradas)'
                ]
                },
                viernes: {
                nombre: 'Viernes - Pull Bíceps',
                ejercicios: [
                    'Chin-ups / Supinas (Lastradas)',
                    'Remo T',
                    'Pull-over en Polea Alta',
                    'Remo con Mancuerna a una mano',
                    'Curl en Banco Inclinado (Manc.)',
                    'Plancha Abdominal (Lastrada)'
                ]
                }
            };

            const [dias, setDias] = useState(diasDefault);
            const [diaActivo, setDiaActivo] = useState('lunes');
            const [vistaActiva, setVistaActiva] = useState('registro');
            const [registros, setRegistros] = useState({});
            const [temaOscuro, setTemaOscuro] = useState(false);
            const [archivoExpandido, setArchivoExpandido] = useState({});
            const [sesionesExpandidas, setSesionesExpandidas] = useState({});
            const [diasSeleccionados, setDiasSeleccionados] = useState({
                lunes: true,
                martes: false,
                miercoles: false,
                jueves: false,
                viernes: false
            });
            const [ultimaSesionAgregada, setUltimaSesionAgregada] = useState(null);
            const [editandoDia, setEditandoDia] = useState(null);
            const [nuevoEjercicio, setNuevoEjercicio] = useState('');
            const [mensajeImport, setMensajeImport] = useState(null);
            
            const [tiempoRestante, setTiempoRestante] = useState(90);
            const [timerActivo, setTimerActivo] = useState(false);
            const [tiempoPersonalizado, setTiempoPersonalizado] = useState('');
            const [tiemposGuardados, setTiemposGuardados] = useState([90, 120]);
            const [mostrarConfigTimer, setMostrarConfigTimer] = useState(false);
            const timerInterval = useRef(null);
            
            const fileInputRef = useRef(null);

            useEffect(() => {
                const stored = localStorage.getItem('gymTrackerData');
                const storedTema = localStorage.getItem('gymTrackerTema');
                const storedDias = localStorage.getItem('gymTrackerDias');
                const storedTiempos = localStorage.getItem('gymTrackerTiempos');
                
                if (stored) setRegistros(JSON.parse(stored));
                if (storedTema) setTemaOscuro(storedTema === 'oscuro');
                if (storedDias) setDias(JSON.parse(storedDias));
                if (storedTiempos) setTiemposGuardados(JSON.parse(storedTiempos));
            }, []);

            useEffect(() => {
                localStorage.setItem('gymTrackerData', JSON.stringify(registros));
            }, [registros]);

            useEffect(() => {
                localStorage.setItem('gymTrackerTema', temaOscuro ? 'oscuro' : 'claro');
            }, [temaOscuro]);

            useEffect(() => {
                localStorage.setItem('gymTrackerDias', JSON.stringify(dias));
            }, [dias]);

            useEffect(() => {
                localStorage.setItem('gymTrackerTiempos', JSON.stringify(tiemposGuardados));
            }, [tiemposGuardados]);

            useEffect(() => {
                if (timerActivo && tiempoRestante > 0) {
                timerInterval.current = setInterval(() => {
                    setTiempoRestante(prev => {
                    if (prev <= 1) {
                        setTimerActivo(false);
                        reproducirSonido();
                        return 0;
                    }
                    return prev - 1;
                    });
                }, 1000);
                } else {
                if (timerInterval.current) clearInterval(timerInterval.current);
                }
                return () => {
                if (timerInterval.current) clearInterval(timerInterval.current);
                };
            }, [timerActivo, tiempoRestante]);

            const reproducirSonido = () => {
                try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
                } catch (error) {
                console.log('Audio no disponible');
                }
            };

            const iniciarTimer = (segundos) => {
                setTiempoRestante(segundos);
                setTimerActivo(true);
            };

            const pausarTimer = () => setTimerActivo(false);

            const reiniciarTimer = () => {
                setTimerActivo(false);
                setTiempoRestante(90);
            };

            const agregarTiempoGuardado = () => {
                const tiempo = parseInt(tiempoPersonalizado);
                if (tiempo && tiempo > 0 && tiemposGuardados.length < 2) {
                setTiemposGuardados([...tiemposGuardados, tiempo]);
                setTiempoPersonalizado('');
                }
            };

            const eliminarTiempoGuardado = (index) => {
                setTiemposGuardados(tiemposGuardados.filter((_, i) => i !== index));
            };

            const formatearTiempo = (segundos) => {
                const mins = Math.floor(segundos / 60);
                const secs = segundos % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const coloresDias = {
                lunes: '#3B82F6',
                martes: '#EF4444',
                miercoles: '#10B981',
                jueves: '#F59E0B',
                viernes: '#8B5CF6'
            };

            const obtenerDiaDesdeNombre = (nombreDia) => {
                const mapeo = {
                'Lunes - Push Pecho': 'lunes',
                'Martes - Pull Espalda': 'martes',
                'Miércoles - Pierna + Abs': 'miercoles',
                'Jueves - Push Hombro': 'jueves',
                'Viernes - Pull Bíceps': 'viernes'
                };
                return mapeo[nombreDia] || null;
            };

            const calcular1RM = (peso, reps) => {
                if (reps === 1) return peso;
                return Math.round(peso * (1 + reps / 30) * 10) / 10;
            };

            const obtener1RMPorEjercicio = (ejercicio) => {
                let mejorRM = 0;
                
                Object.keys(registros).forEach(dia => {
                if (registros[dia]) {
                    registros[dia]
                    .filter(r => r.ejercicio === ejercicio && r.peso > 0 && r.reps > 0)
                    .forEach(r => {
                        const rm = calcular1RM(r.peso, r.reps);
                        if (rm > mejorRM) mejorRM = rm;
                    });
                }
                });
                
                return mejorRM;
            };

            const calcularEstadisticas = () => {
                const hoy = new Date();
                const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
                const inicioMesPasado = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
                const finMesPasado = new Date(hoy.getFullYear(), hoy.getMonth(), 0);
                
                const todasLasFechas = new Set();
                Object.keys(registros).forEach(dia => {
                if (registros[dia]) {
                    registros[dia].forEach(reg => todasLasFechas.add(reg.fecha));
                }
                });
                
                const fechasOrdenadas = Array.from(todasLasFechas).sort();
                
                const entrenamientosEsteMes = fechasOrdenadas.filter(f => {
                const fecha = new Date(f);
                return fecha >= inicioMes;
                }).length;
                
                const entrenamientosMesPasado = fechasOrdenadas.filter(f => {
                const fecha = new Date(f);
                return fecha >= inicioMesPasado && fecha <= finMesPasado;
                }).length;
                
                let rachaActual = 0;
                let rachaMasLarga = 0;
                let protectoresDisponibles = 0;
                let ultimaSemana = null;
                
                if (fechasOrdenadas.length > 0) {
                const fechasDesc = [...fechasOrdenadas].reverse();
                let ultimaFecha = new Date(fechasDesc[0]);
                const hoyFecha = new Date(hoy.toISOString().split('T')[0]);
                
                const diffDias = Math.floor((hoyFecha - ultimaFecha) / (1000 * 60 * 60 * 24));
                
                if (diffDias <= 1) {
                    rachaActual = 1;
                    
                    for (let i = 1; i < fechasDesc.length; i++) {
                    const fechaActual = new Date(fechasDesc[i]);
                    const fechaAnterior = new Date(fechasDesc[i - 1]);
                    const diff = Math.floor((fechaAnterior - fechaActual) / (1000 * 60 * 60 * 24));
                    
                    const semanaActual = Math.floor(fechaActual.getTime() / (7 * 24 * 60 * 60 * 1000));
                    if (ultimaSemana !== semanaActual) {
                        protectoresDisponibles = 2;
                        ultimaSemana = semanaActual;
                    }
                    
                    if (diff === 1) {
                        rachaActual++;
                    } else if (diff <= 3 && protectoresDisponibles > 0) {
                        rachaActual++;
                        protectoresDisponibles--;
                    } else {
                        break;
                    }
                    }
                }
                }
                
                protectoresDisponibles = 0;
                ultimaSemana = null;
                let rachaTemp = 0;
                
                for (let i = 0; i < fechasOrdenadas.length; i++) {
                if (i === 0) {
                    rachaTemp = 1;
                    continue;
                }
                
                const fechaActual = new Date(fechasOrdenadas[i]);
                const fechaAnterior = new Date(fechasOrdenadas[i - 1]);
                const diff = Math.floor((fechaActual - fechaAnterior) / (1000 * 60 * 60 * 24));
                
                const semanaActual = Math.floor(fechaActual.getTime() / (7 * 24 * 60 * 60 * 1000));
                if (ultimaSemana !== semanaActual) {
                    protectoresDisponibles = 2;
                    ultimaSemana = semanaActual;
                }
                
                if (diff === 1) {
                    rachaTemp++;
                } else if (diff <= 3 && protectoresDisponibles > 0) {
                    rachaTemp++;
                    protectoresDisponibles--;
                } else {
                    if (rachaTemp > rachaMasLarga) rachaMasLarga = rachaTemp;
                    rachaTemp = 1;
                    protectoresDisponibles = 2;
                }
                }
                
                if (rachaTemp > rachaMasLarga) rachaMasLarga = rachaTemp;
                
                const semanasMilisegundos = 7 * 24 * 60 * 60 * 1000;
                const totalDias = fechasOrdenadas.length > 0 
                ? Math.max(1, Math.floor((hoy - new Date(fechasOrdenadas[0])) / semanasMilisegundos))
                : 1;
                const promedioSemana = (fechasOrdenadas.length / totalDias).toFixed(1);
                
                let totalRIR = 0;
                let countRIR = 0;
                Object.keys(registros).forEach(dia => {
                if (registros[dia]) {
                    registros[dia].forEach(reg => {
                    if (reg.rir && !isNaN(parseInt(reg.rir))) {
                        totalRIR += parseInt(reg.rir);
                        countRIR++;
                    }
                    });
                }
                });
                const promedioRIR = countRIR > 0 ? (totalRIR / countRIR).toFixed(1) : 'N/A';
                
                return {
                totalEntrenamientos: fechasOrdenadas.length,
                entrenamientosEsteMes,
                entrenamientosMesPasado,
                rachaActual,
                rachaMasLarga,
                promedioSemana,
                promedioRIR
                };
            };

            // --- AQUÍ ESTÁ LA CORRECCIÓN ---
            const importarCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                try {
                    const csv = event.target.result;
                    const lineas = csv.split('\n').filter(l => l.trim());
                    
                    if (lineas.length < 2) {
                    setMensajeImport({ tipo: 'error', texto: 'El archivo CSV está vacío' });
                    return;
                    }

                    const nuevosRegistros = {};
                    
                    // Mapa para guardar las IDs generadas por fecha
                    // Si ya existe una ID para "2023-10-25", la reusamos.
                    const sessionMap = {}; 
                    
                    for (let i = 1; i < lineas.length; i++) {
                    const linea = lineas[i].split(',');
                    if (linea.length < 7) continue;

                    const [nombreDia, fecha, ejercicio, series, reps, peso, rir] = linea;
                    const dia = obtenerDiaDesdeNombre(nombreDia.trim());
                    const fechaLimpia = fecha.trim();
                    
                    if (!dia) continue;
                    
                    if (!nuevosRegistros[dia]) nuevosRegistros[dia] = [];

                    // Lógica de agrupación corregida:
                    // 1. Verificamos si ya tenemos una ID para esta fecha
                    if (!sessionMap[fechaLimpia]) {
                        // Si no existe, creamos una nueva y la guardamos en el mapa
                        sessionMap[fechaLimpia] = `${fechaLimpia}-imported-${Date.now()}-${Math.random()}`;
                    }
                    
                    // 2. Usamos la ID guardada en el mapa (así todos los ejercicios de esa fecha comparten ID)
                    const sessionId = sessionMap[fechaLimpia];
                    
                    nuevosRegistros[dia].push({
                        id: Date.now() + Math.random() + i,
                        sessionId: sessionId,
                        fecha: fechaLimpia,
                        ejercicio: ejercicio.trim(),
                        series: parseInt(series) || 0,
                        reps: parseInt(reps) || 0,
                        peso: parseFloat(peso) || 0,
                        rir: rir ? rir.trim() : ''
                    });
                    }

                    setRegistros(nuevosRegistros);
                    setMensajeImport({ tipo: 'exito', texto: `${lineas.length - 1} registros importados correctamente` });
                    setTimeout(() => setMensajeImport(null), 3000);
                } catch (error) {
                    setMensajeImport({ tipo: 'error', texto: 'Error al procesar el archivo CSV' });
                    setTimeout(() => setMensajeImport(null), 3000);
                }
                };

                reader.readAsText(file);
                e.target.value = '';
            };

            const agregarSesionCompleta = (dia) => {
                const hoy = new Date();
                const fecha = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
                const nuevosRegistros = { ...registros };
                
                if (!nuevosRegistros[dia]) nuevosRegistros[dia] = [];
                
                const sessionId = `${fecha}-${Date.now()}`;
                
                dias[dia].ejercicios.forEach(ejercicio => {
                nuevosRegistros[dia].push({
                    id: Date.now() + Math.random(),
                    sessionId,
                    fecha,
                    ejercicio,
                    series: 3,
                    reps: 8,
                    peso: 0,
                    rir: ''
                });
                });
                
                setRegistros(nuevosRegistros);
                setUltimaSesionAgregada(sessionId);
                setSesionesExpandidas({...sesionesExpandidas, [sessionId]: true});
                
                setTimeout(() => setUltimaSesionAgregada(null), 3000);
            };

            const actualizarFechaSesion = (dia, sessionId, nuevaFecha) => {
                const nuevosRegistros = { ...registros };
                nuevosRegistros[dia] = nuevosRegistros[dia].map(reg => 
                reg.sessionId === sessionId ? { ...reg, fecha: nuevaFecha } : reg
                );
                setRegistros(nuevosRegistros);
            };

            const actualizarRegistro = (dia, id, campo, valor) => {
                const nuevosRegistros = { ...registros };
                const index = nuevosRegistros[dia].findIndex(r => r.id === id);
                if (index !== -1) {
                nuevosRegistros[dia][index][campo] = valor;
                setRegistros(nuevosRegistros);
                }
            };

            const eliminarRegistro = (dia, id) => {
                const nuevosRegistros = { ...registros };
                nuevosRegistros[dia] = nuevosRegistros[dia].filter(r => r.id !== id);
                setRegistros(nuevosRegistros);
            };

            const calcularVolumen = (registro) => {
                return registro.series * registro.reps * registro.peso;
            };

            const calcularVolumenSesion = (ejercicios) => {
                return ejercicios.reduce((total, reg) => total + calcularVolumen(reg), 0);
            };

            const obtenerProgresionPorDias = () => {
                const datos = {};
                
                Object.keys(diasSeleccionados).forEach(dia => {
                if (!diasSeleccionados[dia] || !registros[dia]) return;
                
                dias[dia].ejercicios.forEach(ejercicio => {
                    if (!datos[ejercicio]) datos[ejercicio] = [];
                    
                    registros[dia]
                    .filter(r => r.ejercicio === ejercicio)
                    .forEach(r => {
                        datos[ejercicio].push({
                        fecha: r.fecha,
                        peso: r.peso,
                        reps: r.reps,
                        dia: dia
                        });
                    });
                });
                });
                
                Object.keys(datos).forEach(ejercicio => {
                datos[ejercicio].sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                });
                
                return datos;
            };

            const obtenerVolumenPorDias = () => {
                const datos = {};
                
                Object.keys(diasSeleccionados).forEach(dia => {
                if (!diasSeleccionados[dia] || !registros[dia]) return;
                
                const sesiones = agruparPorSesion(registros[dia]);
                sesiones.forEach(sesion => {
                    if (!datos[dia]) datos[dia] = [];
                    datos[dia].push({
                    fecha: sesion.fecha,
                    volumen: calcularVolumenSesion(sesion.ejercicios)
                    });
                });
                });
                
                Object.keys(datos).forEach(dia => {
                datos[dia].sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                });
                
                return datos;
            };

            const agruparPorSesion = (registrosDia) => {
                if (!registrosDia) return [];
                const sesiones = {};
                registrosDia.forEach(reg => {
                const key = reg.sessionId || reg.fecha;
                if (!sesiones[key]) {
                    sesiones[key] = {
                    fecha: reg.fecha,
                    sessionId: key,
                    ejercicios: []
                    };
                }
                sesiones[key].ejercicios.push(reg);
                });
                return Object.values(sesiones).sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            };

            const toggleSesion = (sessionId) => {
                setSesionesExpandidas({
                ...sesionesExpandidas,
                [sessionId]: !sesionesExpandidas[sessionId]
                });
            };

            const agregarEjercicio = (dia) => {
                if (!nuevoEjercicio.trim()) return;
                const nuevosDias = { ...dias };
                nuevosDias[dia].ejercicios.push(nuevoEjercicio.trim());
                setDias(nuevosDias);
                setNuevoEjercicio('');
            };

            const eliminarEjercicio = (dia, index) => {
                const nuevosDias = { ...dias };
                nuevosDias[dia].ejercicios.splice(index, 1);
                setDias(nuevosDias);
            };

            const moverEjercicio = (dia, index, direccion) => {
                const nuevosDias = { ...dias };
                const ejercicios = [...nuevosDias[dia].ejercicios];
                const newIndex = index + direccion;
                
                if (newIndex >= 0 && newIndex < ejercicios.length) {
                [ejercicios[index], ejercicios[newIndex]] = [ejercicios[newIndex], ejercicios[index]];
                nuevosDias[dia].ejercicios = ejercicios;
                setDias(nuevosDias);
                }
            };

            const exportarCSV = () => {
                let csv = 'Día,Fecha,Ejercicio,Series,Reps,Peso,RIR,Volumen\n';
                
                Object.keys(registros).forEach(dia => {
                if (registros[dia]) {
                    registros[dia].forEach(reg => {
                    csv += `${dias[dia].nombre},${reg.fecha},${reg.ejercicio},${reg.series},${reg.reps},${reg.peso},${reg.rir || ''},${calcularVolumen(reg)}\n`;
                    });
                }
                });
                
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'registro_entrenamiento.csv';
                a.click();
            };

            const bgPrimary = temaOscuro ? 'bg-gray-900' : 'bg-gray-50';
            const bgSecundary = temaOscuro ? 'bg-gray-800' : 'bg-white';
            const textPrimary = temaOscuro ? 'text-gray-100' : 'text-gray-800';
            const textSecundary = temaOscuro ? 'text-gray-300' : 'text-gray-600';
            const border = temaOscuro ? 'border-gray-700' : 'border-gray-200';
            const hover = temaOscuro ? 'hover:bg-gray-700' : 'hover:bg-gray-50';
            const inputBg = temaOscuro ? 'bg-gray-700 text-gray-100' : 'bg-white text-gray-900';

            return (
                <div className={`min-h-screen ${bgPrimary} p-4`}>
                <div className="max-w-7xl mx-auto">
                    <div className={`${bgSecundary} rounded-lg shadow-lg p-6 mb-6`}>
                    <div className="flex justify-between items-center mb-6 flex-wrap gap-4">
                        <h1 className={`text-3xl font-bold ${textPrimary}`}>Registro Gym</h1>
                        <div className="flex gap-2 flex-wrap">
                        <button
                            onClick={() => setVistaActiva('estadisticas')}
                            className={`p-2 rounded-lg ${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80 transition`}
                            title="Estadísticas"
                        >
                            🏆
                        </button>
                        <button
                            onClick={() => setVistaActiva('ajustes')}
                            className={`p-2 rounded-lg ${temaOscuro ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-700'} hover:opacity-80 transition`}
                            title="Ajustes"
                        >
                            ⚙️
                        </button>
                        <button
                            onClick={() => setTemaOscuro(!temaOscuro)}
                            className={`p-2 rounded-lg ${temaOscuro ? 'bg-gray-700 text-yellow-400' : 'bg-gray-200 text-gray-700'} hover:opacity-80 transition`}
                        >
                            {temaOscuro ? '☀️' : '🌙'}
                        </button>
                        <input

                                    {diasConDatos.map(dia => {
                                    return volumenPorDias[dia].map((dato, idx, arr) => {
                                        const x = (todasLasFechas.indexOf(dato.fecha) / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                        const y = 100 - ((dato.volumen / maxVolumen) * 85);
                                        
                                        return (
                                        <g key={`${dia}-${idx}`}>
                                            {idx < arr.length - 1 && (() => {
                                            const nextDato = arr[idx + 1];
                                            const nextX = (todasLasFechas.indexOf(nextDato.fecha) / Math.max(todasLasFechas.length - 1, 1)) * 100;
                                            const nextY = 100 - ((nextDato.volumen / maxVolumen) * 85);
                                            
                                            return (
                                                <line
                                                x1={x}
                                                y1={y}
                                                x2={nextX}
                                                y2={nextY}
                                                stroke={coloresDias[dia]}
                                                strokeWidth="2"
                                                vectorEffect="non-scaling-stroke"
                                                />
                                            );
                                            })()}
                                            <circle
                                            cx={x}
                                            cy={y}
                                            r="1.5"
                                            fill={coloresDias[dia]}
                                            vectorEffect="non-scaling-stroke"
                                            />
                                            <text
                                            x={x}
                                            y={y - 3}
                                            textAnchor="middle"
                                            fill={temaOscuro ? '#E5E7EB' : '#374151'}
                                            style={{ fontSize: '3px', fontWeight: 'bold' }}
                                            >
                                            {Math.round(dato.volumen)}
                                            </text>
                                            <text
                                            x={x}
                                            y="110"
                                            textAnchor="middle"
                                            fill={temaOscuro ? '#9CA3AF' : '#6B7280'}
                                            style={{ fontSize: '2.5px' }}
                                            >
                                            {dato.fecha.substring(5)}
                                            </text>
                                        </g>
                                        );
                                    });
                                    })}
                                </svg>
                                </div>
                                
                                <div>
                                <h4 className={`font-semibold mb-3 ${textPrimary}`}>Leyenda</h4>
                                <div className="flex flex-wrap gap-3">
                                    {diasConDatos.map(dia => (
                                    <div key={dia} className="flex items-center gap-2">
                                        <div 
                                        className="w-4 h-4 rounded"
                                        style={{ backgroundColor: coloresDias[dia] }}
                                        />
                                        <span className={`${textSecundary} text-sm`}>{dias[dia].nombre.split(' - ')[0]}</span>
                                    </div>
                                    ))}
                                </div>
                                </div>
                            </div>
                            );
                        })()}
                        </div>
                    )}

                    {vistaActiva === 'ajustes' && (
                        <div>
                        <h2 className={`text-2xl font-bold mb-6 ${textPrimary}`}>⚙️ Ajustes</h2>
                        
                        <div className="space-y-6">
                            {Object.keys(dias).map(dia => (
                            <div key={dia} className={`border ${border} rounded-lg p-4`}>
                                <h3 className={`font-semibold text-base mb-3 ${textPrimary}`}>{dias[dia].nombre}</h3>
                                
                                <div className="space-y-2 mb-4">
                                {dias[dia].ejercicios.map((ejercicio, idx) => (
                                    <div key={idx} className={`flex items-center gap-2 p-2 rounded ${hover}`}>
                                    <span className={`flex-1 text-sm ${textPrimary}`}>{ejercicio}</span>
                                    <button
                                        onClick={() => moverEjercicio(dia, idx, -1)}
                                        disabled={idx === 0}
                                        className={`p-1 ${idx === 0 ? 'opacity-30' : ''}`}
                                    >
                                        ⬆️
                                    </button>
                                    <button
                                        onClick={() => moverEjercicio(dia, idx, 1)}
                                        disabled={idx === dias[dia].ejercicios.length - 1}
                                        className={`p-1 ${idx === dias[dia].ejercicios.length - 1 ? 'opacity-30' : ''}`}
                                    >
                                        ⬇️
                                    </button>
                                    <button
                                        onClick={() => eliminarEjercicio(dia, idx)}
                                        className="p-1 text-red-600 hover:text-red-800 transition"
                                    >
                                        🗑️
                                    </button>
                                    </div>
                                ))}
                                </div>
                                
                                <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={editandoDia === dia ? nuevoEjercicio : ''}
                                    onChange={(e) => {
                                    setEditandoDia(dia);
                                    setNuevoEjercicio(e.target.value);
                                    }}
                                    onKeyPress={(e) => {
                                    if (e.key === 'Enter') {
                                        agregarEjercicio(dia);
                                        setEditandoDia(null);
                                    }
                                    }}
                                    placeholder="Nuevo ejercicio..."
                                    className={`flex-1 border ${border} rounded px-3 py-2 ${inputBg} text-sm`}
                                />
                                <button
                                    onClick={() => {
                                    agregarEjercicio(dia);
                                    setEditandoDia(null);
                                    }}
                                    className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"
                                >
                                    ➕
                                </button>
                                </div>
                            </div>
                            ))}
                        </div>
                        </div>
                    )}
                    </div>
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GymTracker />);
    </script>
</body>
</html>
